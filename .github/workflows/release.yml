name: "Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        default: '0.1.0'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "Release v${{ github.event.inputs.version }}"
          body: "Manual release from GitHub Actions."
          draft: true
          prerelease: false
          generate_release_notes: true

  build-desktop:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Silicon Mac
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # Intel Mac
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: install bun
        uses: oven-sh/setup-bun@v2
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: install frontend dependencies
        run: bun install
      - uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ github.event.inputs.version }}
          releaseName: "Release v${{ github.event.inputs.version }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  build-mobile:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-latest"
            target: "android"
          - platform: "macos-latest"
            target: "ios"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: install bun
        uses: oven-sh/setup-bun@v2
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || 'aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim' }}
      - name: install frontend dependencies
        run: bun install

      - name: setup java (Android only)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup android SDK (Android only)
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      # Android Build
      - name: build android
        if: matrix.target == 'android'
        run: bun tauri android build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # iOS Build
      - name: build ios
        if: matrix.target == 'ios'
        run: bun tauri ios build --no-signing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload Mobile Assets to the SAME Release
      - name: upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
            src-tauri/gen/apple/build/Release-iphoneos/*.ipa
            src-tauri/gen/apple/build/Release-iphonesimulator/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

